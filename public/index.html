<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Fantasy Draft</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- ========================= -->
    <!-- GLÜCKSRAD SCREEN -->
    <!-- ========================= -->

    <div id="wheelScreen">

        <h1>🏀 NBA Team Glücksrad</h1>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="600" height="600"></canvas>
        </div>

        <button id="spinBtn">🎡 Drehen</button>

        <div id="result">Klicke auf Drehen</div>

        <div id="draftButtons">
            <button id="addP1">
                ➕ Add Player to Person 1
            </button>

            <button id="addP2">
                ➕ Add Player to Person 2
            </button>
        </div>

    </div>



    <!-- ========================= -->
    <!-- DRAFT SCREEN -->
    <!-- ========================= -->

    <div id="draftScreen">

        <div class="draft-header">

            <h2 id="draftTitle">
                Draft
            </h2>

            <button id="backBtn">
                ⬅ Zurück zum Glücksrad
            </button>

        </div>



        <div class="draft-layout">

            <!-- ========================= -->
            <!-- SPIELER LISTE -->
            <!-- ========================= -->

            <div class="players-panel">

                <h2 id="teamTitle">
                    Team Spieler
                </h2>

                <input
                    type="text"
                    id="playerSearch"
                    placeholder="🔍 Spieler suchen..."
                >

                <div id="playersList">

                    <!-- Dynamisch durch JS -->

                </div>

            </div>



            <!-- ========================= -->
            <!-- ROSTER -->
            <!-- ========================= -->

            <div class="roster-panel">

                <h2 id="rosterTitle">
                    Person
                </h2>

                <div id="roster">

                    <!-- PG -->
                    <div class="roster-slot"
                         data-slot="PG1">
                        <span class="position">PG</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <div class="roster-slot"
                         data-slot="PG2">
                        <span class="position">PG</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <!-- SG -->
                    <div class="roster-slot"
                         data-slot="SG1">
                        <span class="position">SG</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <div class="roster-slot"
                         data-slot="SG2">
                        <span class="position">SG</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <!-- SF -->
                    <div class="roster-slot"
                         data-slot="SF1">
                        <span class="position">SF</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <div class="roster-slot"
                         data-slot="SF2">
                        <span class="position">SF</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <!-- PF -->
                    <div class="roster-slot"
                         data-slot="PF1">
                        <span class="position">PF</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <div class="roster-slot"
                         data-slot="PF2">
                        <span class="position">PF</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <!-- CENTER -->
                    <div class="roster-slot"
                         data-slot="C1">
                        <span class="position">C</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                    <div class="roster-slot"
                         data-slot="C2">
                        <span class="position">C</span>
                        <span class="player-name">
                            Leer
                        </span>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
