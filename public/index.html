<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Glücksrad</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <h1>🏀 NBA Team Glücksrad</h1>

    <div id="wheelScreen">

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="600" height="600"></canvas>
        </div>

        <button id="spinBtn">Drehen</button>

        <div id="result">Klicke auf Drehen</div>

        <div id="draftButtons">
            <button id="addP1">➕ Add Player to Person 1</button>
            <button id="addP2">➕ Add Player to Person 2</button>
        </div>

    </div>

    <div id="rosterScreen">

        <h2 id="rosterTitle"></h2>

        <div id="roster"></div>

        <button id="backBtn">⬅ Zurück</button>

    </div>

</body>
</html>
